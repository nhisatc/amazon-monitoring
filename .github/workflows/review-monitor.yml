name: Review Monitor (Every 2 Hours)

permissions:
  contents: write
  metadata: read

on:
  schedule:
    # Run at midnight EST (5am UTC) plus every 2 hours during day
    - cron: '0 5,6,8,10,12,14,16,18,20,22 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  review-monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install junglescout-client certifi pandas httpx python-dotenv

      - name: Run Review Monitor
        env:
          JUNGLE_SCOUT_API_KEY_NAME: ${{ secrets.JUNGLE_SCOUT_API_KEY_NAME }}
          JUNGLE_SCOUT_API_KEY: ${{ secrets.JUNGLE_SCOUT_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_RECIPIENTS: ${{ secrets.ALERT_RECIPIENTS }}
        run: python review_monitor_js.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git commit -m "Auto: Review monitor data updated" || echo "No changes to commit"
          git push
