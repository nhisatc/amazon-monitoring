name: Review Monitor (Every 2 Hours)

on:
  schedule:
    # Run every 2 hours from 6 AM to 10 PM UTC
    - cron: '0 6,8,10,12,14,16,18,20,22 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  review-monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install junglescout-python certifi pandas httpx

      - name: Run Review Monitor
        env:
          JUNGLE_SCOUT_API_KEY_NAME: ${{ secrets.JUNGLE_SCOUT_API_KEY_NAME }}
          JUNGLE_SCOUT_API_KEY: ${{ secrets.JUNGLE_SCOUT_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_RECIPIENT: ${{ secrets.SMTP_RECIPIENT }}
        run: python review_monitor_js.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git commit -m "Auto: Review monitor data updated" || echo "No changes to commit"
          git push
