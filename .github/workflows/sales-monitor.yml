name: Daily Sales Monitor

permissions:
  contents: write

on:
  schedule:
    - cron: '0 5 * * *'    # Once daily at midnight EST (5am UTC)
  workflow_dispatch:  # Allow manual trigger

jobs:
  sales-monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-amazon-sp-api certifi pandas httpx python-dotenv

      - name: Run Sales Monitor
        env:
          JUNGLE_SCOUT_API_KEY_NAME: ${{ secrets.JUNGLE_SCOUT_API_KEY_NAME }}
          JUNGLE_SCOUT_API_KEY: ${{ secrets.JUNGLE_SCOUT_API_KEY }}
          LWA_APP_ID: ${{ secrets.LWA_APP_ID }}
          LWA_CLIENT_SECRET: ${{ secrets.LWA_CLIENT_SECRET }}
          SP_API_REFRESH_TOKEN: ${{ secrets.SP_API_REFRESH_TOKEN }}
          SELLER_ID: ${{ secrets.SELLER_ID }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_RECIPIENTS: ${{ secrets.ALERT_RECIPIENTS }}
        run: python sales_monitor.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git commit -m "Auto: Sales monitor data updated" || echo "No changes to commit"
          git push
